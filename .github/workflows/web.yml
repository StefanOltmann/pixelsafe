name: Deploy to web

on:
  push:
    branches: [ "main" ]

env:
  BUILD_TARGET: 'web'

jobs:
  
  build:
    name: Build Kotlin/Wasm
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '25'
      - name: Checkout code
        uses: actions/checkout@v4
      - name: List all files
        run: find .
      - name: Run Gradle build
        run: |
          chmod +x gradlew
          ./gradlew build allTests wasmJsBrowserDistribution
      - name: Fix permissions
        run: |
          chmod -v -R +rX "app/build/dist/wasmJs/productionExecutable/" | while read line; do
            echo "::warning title=Invalid file permissions automatically fixed::$line"
          done
      - name: Deploy over FTP
        uses: modern-dev/ftp-mirror@v2
        with:
          server: ${{ secrets.FTP_SERVER }}
          user: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local_dir: "app/build/dist/wasmJs/productionExecutable"
          remote_dir: "/httpdocs/pixelsafe/"
          delete: true
